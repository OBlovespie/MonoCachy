	linux	/boot/vmlinuz-linux-cachyos-lts root=UUID=e118347f-e5ee-4fb9-9b2c-924771806470 rw  nowatchdog nvme_load=YES splash loglevel=3
	echo	'Loading initial ramdisk ...'
	initrd	/boot/initramfs-linux-cachyos-lts.img
}
